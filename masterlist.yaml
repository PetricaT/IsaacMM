# masterlist.yaml — IsaacMM auto-sort masterlist
# -----------------------------------------------
# Inspired by LOOT for Skyrim, adapted for The Binding of Isaac.
#
# Matching priority (first match wins):
#   1. id     — Steam Workshop ID (number after '_' in folder name)
#   2. pattern — regex matched against the full folder name
#   3. tag    — matched against <tag id="..."> in metadata.xml
#   4. name   — matched against <name> in metadata.xml (least reliable, MM edits it)
#
# Load order is determined by group priority (lower = loads earlier),
# then refined by before/after constraints within the same priority tier.
# v1

groups:
  - name: framework
    priority: 0

  - name: libraries
    priority: 10

  - name: content
    priority: 20

  - name: tweaks
    priority: 30

  - name: overrides
    priority: 35

  - name: graphics
    priority: 40

  - name: music
    priority: 45

  - name: late
    priority: 50

  - name: unknown
    priority: 99

# ---------------------------------------------------------------------------
# Mod entries
#   id        — Steam Workshop ID (exact match from folder name suffix)
#   pattern   — regex matched against the full folder name
#   name      — human-readable label (for logging / UI hints)
#   group     — group name from the list above
#   after     — list of Steam IDs this mod must load after (dependencies)
#   before    — list of Steam IDs this mod must load before
#   requires  — list of Steam IDs that must be present (warns if missing)
#   tag       — matched against <tag id="..."> in metadata.xml
# ---------------------------------------------------------------------------
