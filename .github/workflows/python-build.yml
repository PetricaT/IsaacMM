name: Build release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Extract Version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
        shell: bash

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build + Package (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          pyinstaller .\IsaacMM-Windows.spec
          Move-Item "dist\IsaacMM-Windows.exe" "dist\IsaacMM-$env:VERSION-Windows.exe"

      - name: Build + Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          pyinstaller IsaacMM-MacOS.spec
          mkdir -p dmg
          cp -r "dist/IsaacMM.app" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create -volname "IsaacMM" -srcfolder dmg -ov -format UDZO "dist/IsaacMM-${VERSION}-MacOS.dmg"
          rm -rf dmg dist/IsaacMM.app

      - name: Build + Package (Linux — AppImage)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          pyinstaller IsaacMM-Linux.spec

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          mkdir -p "IsaacMM.AppDir/usr/bin"
          cp -r "dist/IsaacMM-Linux/"* "IsaacMM.AppDir/usr/bin/"

          cat > IsaacMM.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/IsaacMM-Linux.elf" "$@"
          APPRUN
          chmod +x IsaacMM.AppDir/AppRun

          cp IsaacMM.desktop IsaacMM.AppDir/
          cp assets/icon.png IsaacMM.AppDir/IsaacMM.png

          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool IsaacMM.AppDir "dist/IsaacMM-${VERSION}-x86_64.AppImage"
          rm -rf IsaacMM.AppDir dist/IsaacMM-Linux

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/IsaacMM-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/build-*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
