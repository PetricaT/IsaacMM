name: Build release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Extract Version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
        shell: bash

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install UPX (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Install UPX (macOS)
        if: runner.os == 'macOS'
        run: brew install upx

      - name: Build + Package (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          pyinstaller .\IsaacMM-Windows.spec
          Move-Item "dist\IsaacMM-Windows.exe" "dist\IsaacMM-$env:VERSION-Windows.exe"

      - name: Build + Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          pyinstaller IsaacMM-MacOS.spec
          mv dist/IsaacMM-MacOS.app "dist/IsaacMM-${VERSION}-MacOS.app"

      - name: Build + Package (Linux — AppImage)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          pyinstaller IsaacMM-Linux.spec

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          mkdir -p "IsaacMM.AppDir/usr/bin"
          cp -r "dist/IsaacMM-Linux/"* "IsaacMM.AppDir/usr/bin/"

          cat > IsaacMM.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/IsaacMM-Linux.elf" "$@"
          APPRUN
          chmod +x IsaacMM.AppDir/AppRun

          cp IsaacMM.desktop IsaacMM.AppDir/
          cp assets/icon.png IsaacMM.AppDir/IsaacMM.png

          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool --comp zstd IsaacMM.AppDir "dist/IsaacMM-${VERSION}-x86_64.AppImage"
          rm -rf IsaacMM.AppDir dist/IsaacMM-Linux

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/IsaacMM-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          for f in build-*/*; do
            name="${f#*/}"
            if [ -f "$f" ]; then
              sha256sum "$f" | sed "s|$f|$name|"
            elif [ -d "$f" ]; then
              tar cf - "$f" | sha256sum | sed "s|-|$name|"
            fi
          done > SHA256SUMS.txt
          cat SHA256SUMS.txt
          cd ..

          NOTES=$(printf '### SHA256 Checksums\n```\n%s\n```\n' "$(cat artifacts/SHA256SUMS.txt)")

          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            EXISTING=$(gh release view "${{ github.ref_name }}" --json body --jq '.body')
            printf '%s\n\n%s\n' "$EXISTING" "$NOTES" > body.md
            gh release edit "${{ github.ref_name }}" --notes-file body.md
            gh release upload "${{ github.ref_name }}" artifacts/SHA256SUMS.txt --clobber
            for f in artifacts/build-*/*; do
              gh release upload "${{ github.ref_name }}" "$f" --clobber
            done
          else
            printf '%s\n' "$NOTES" > body.md
            gh release create "${{ github.ref_name }}" \
              --notes-file body.md \
              artifacts/SHA256SUMS.txt \
              artifacts/build-*/*
          fi
